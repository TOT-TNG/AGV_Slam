<style>
  :root { --bg:#0f172a; --panel: rgba(15,23,42,0.95); }
  html,body { height:100%; margin:0; background:var(--bg); color:#fff; font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial; overflow:hidden; }
 
 /* ======================================= */
 /* CГЎВәВ¬P NHГЎВәВ¬T TOPBAR & TOGGLE BUTTON */
 /* ======================================= */
 
 /* CONTAINER CHГЎВ»ВЁA THANH Г„ВҗIГЎВ»вӮ¬U KHIГЎВ»вҖҡN (SГЎВәВј TRГҶВҜГЎВ»ВўT) */
 #top-bar-wrapper {
  position: fixed; left: 0; right: 0; top: 0; 
  z-index: 1200;
  transition: transform 0.3s ease-in-out;
  transform: translateY(0); 
 }
 
 #top-bar {
  height: auto; 
  display: flex; align-items: center; justify-content: space-between; 
  padding: 12px 16px; 
  background: var(--panel); 
  box-shadow: 0 6px 30px rgba(0,0,0,0.6); 
  backdrop-filter: blur(12px);
  flex-wrap: wrap; 
  gap: 12px;
 }
 
 /* NГғЕЎT MГ…ВЁI TГғЕ N (CГЎВ»Вҗ Г„ВҗГЎВ»Е NH, KHГғвҖқNG TRГҶВҜГЎВ»ВўT CГғв„ўNG TOPBAR) */
 #top-bar-toggle {
  position: fixed; /* RГЎВәВҘt quan trГЎВ»ВҚng: DГғВ№ng fixed Г„вҖҳГЎВ»Ж’ luГғВҙn neo vГғВ o viewport */
  top: var(--top-bar-height-computed, 100px); /* VГЎВ»вҖ№ trГғВӯ ban Г„вҖҳГЎВәВ§u: DГҶВ°ГЎВ»вҖәi Topbar */
  right: 20px; 
  width: 50px; 
  height: 35px; 
  background: #FF5252; /* MГғвӮ¬U Г„ВҗГЎВ»ЕҪ NГЎВ»вҖқI BГЎВәВ¬T */
  color: #fff;
  border-radius: 0 0 10px 10px; 
  cursor: pointer; 
  display: flex; justify-content: center; align-items: center;
  box-shadow: 0 6px 20px rgba(255, 82, 82, 0.5); 
  transition: top 0.3s ease-in-out, transform 0.3s ease-in-out, box-shadow 0.3s, background 0.2s; 
  z-index: 1201; /* LuГғВҙn nГЎВ»вҖўi trГғВӘn Topbar */
 }
 #top-bar-toggle:hover {
   background: #e64a4a;
 }

 /* TrГЎВәВЎng thГғВЎi ГЎВәВ©n: DГЎВ»вҖ№ch chuyГЎВ»Ж’n container lГғВӘn trГғВӘn */
 .topbar-hidden #top-bar-wrapper {
   /* TrГҶВ°ГЎВ»ВЈt Topbar lГғВӘn bГЎВәВұng Г„вҖҳГғВәng chiГЎВ»ВҒu cao Topbar */
   transform: translateY(calc(-1 * var(--top-bar-height-computed, 100px))); 
 }

 /* KHI ГЎВәВЁN: Di chuyГЎВ»Ж’n nГғВәt mГ…В©i tГғВӘn lГғВӘn vГЎВ»вҖ№ trГғВӯ 0px trГғВӘn viewport */
 .topbar-hidden #top-bar-toggle {
   /* Di chuyГЎВ»Ж’n nГғВәt lГғВӘn bГЎВәВұng cГғВЎch thay Г„вҖҳГЎВ»вҖўi thuГЎВ»в„ўc tГғВӯnh TOP */
   top: 0;
   
   /* Xoay mГ…В©i tГғВӘn hГҶВ°ГЎВ»вҖәng lГғВӘn */
   transform: rotate(180deg);
   
   /* CГЎВәВӯp nhГЎВәВӯt lГЎВәВЎi shadow cho nГЎВ»вҖўi bГЎВәВӯt hГҶВЎn khi ГЎВ»Её mГғВ©p mГғВ n hГғВ¬nh */
   box-shadow: 0 0 20px rgba(255, 82, 82, 1); 
 }
 
 /* TrГЎВәВЎng thГғВЎi hiГЎВ»вҖЎn: NГғВәt mГ…В©i tГғВӘn ГЎВ»Её vГЎВ»вҖ№ trГғВӯ dГҶВ°ГЎВ»вҖәi Topbar (top: H) vГғВ  hГҶВ°ГЎВ»вҖәng xuГЎВ»вҖҳng */
 #top-bar-toggle:not(.topbar-hidden-btn) {
   transform: rotate(0deg);
 }

<script>
document.addEventListener('DOMContentLoaded', () => {

// ==================== BIГЎВәВҫN TOГғвӮ¬N CГЎВ»ВӨC ====================
const RES_DEFAULT = 0.05;
let originX = 0, originY = 0, resolution = RES_DEFAULT;
let mapRotation = 0;
let userMapRotationDeg = 0;
let imgNatW = 0, imgNatH = 0;
let scaleView = 1, userZoom = 1, panX = 0, panY = 0;
let dragging = false, dragStart = {}, panStart = {};
let mapData = null;
let currentImg = null;
let agvs = {}; // Biбәҝn lЖ°u trб»Ҝ vб»Ӣ trГӯ AGV
let highlightSegments = []; // array of segments {type:'line'|'bezier', points:[{x,y}...]}
let highlightOwner = null; // agv_id Д‘ang Д‘Ж°б»Јc highlight Д‘Ж°б»қng Д‘i
let highlightDestination = null; // node Д‘Гӯch cб»§a highlight
let highlightDestCoord = null; // tб»Қa Д‘б»ҷ Д‘Гӯch
let lastPoseByAgv = {}; // lЖ°u pose lбә§n trЖ°б»ӣc Д‘б»ғ kiб»ғm tra Д‘б»©ng yГӘn
let stableCounts = {}; // sб»‘ lбә§n liГӘn tiбәҝp pose khГҙng Д‘б»•i
let agvLastUpdate = {}; // thб»қi gian cбәӯp nhбәӯt pose cuб»‘i
let ws = null;
// DOM
const mapSelect = document.getElementById('mapSelect');
const agvSelect = document.createElement('select');
agvSelect.id = 'agvSelect';
agvSelect.style.padding = '6px 10px';
agvSelect.style.borderRadius = '8px';
agvSelect.style.background = 'rgba(255,255,255,0.08)';
agvSelect.style.color = '#fff';
agvSelect.style.border = '1px solid rgba(255,255,255,0.1)';

const statusEl = document.getElementById('status');
const scene = document.getElementById('scene');
const mapInner = document.getElementById('map-inner');
const mapCanvas = document.getElementById('map-canvas');
const overlayCanvas = document.getElementById('overlay-canvas');
const mapLayerEl = document.getElementById('map-layer');
const overlayLayerEl = document.getElementById('overlay-layer');
const flipMapX = document.getElementById('flipMapX');
const flipMapY = document.getElementById('flipMapY');
const nodeLayer = document.getElementById('node-layer');
const edgeLayer = document.getElementById('edge-layer');
const agvLayer = document.getElementById('agv-layer');
const manualRotateInput = document.getElementById('manualRotate');
const applyRotateBtn = document.getElementById('applyRotate');
const resetRotateBtn = document.getElementById('resetRotate');
const resetBtn = document.getElementById('resetView');
const fullscreenBtn = document.getElementById('fullscreen');
const controlsEl = document.getElementById('controls');
if (controlsEl && !document.getElementById('agvSelectContainer')) {
  const wrap = document.createElement('div');
  wrap.id = 'agvSelectContainer';
  wrap.style.display = 'flex';
  wrap.style.alignItems = 'center';
  wrap.style.gap = '6px';
  const label = document.createElement('span');
  label.textContent = 'AGV:';
  wrap.appendChild(label);
  wrap.appendChild(agvSelect);
  controlsEl.appendChild(wrap);
}

const toggleSimBtn = document.createElement('div');
toggleSimBtn.className = 'btn';
toggleSimBtn.id = 'toggleSim';
toggleSimBtn.textContent = 'Bбәӯt mГҙ phб»Ҹng';
document.getElementById('controls').appendChild(toggleSimBtn);
let nodeModal = null;
let agvModal = null;
let simulationMode = false;
let simAnimations = {};
let simEdgeLocks = {};
let simActiveEdge = {};

function clearAgvLocks(agvId) {
  Object.keys(simEdgeLocks).forEach(k => { if (simEdgeLocks[k] === agvId) delete simEdgeLocks[k]; });
}

function setEdgeLock(agvId, a, b) {
  clearAgvLocks(agvId);
  if (!a || !b) return false;
  const key1 = `${a}->${b}`;
  const key2 = `${b}->${a}`;
  if ((simEdgeLocks[key1] && simEdgeLocks[key1] !== agvId) ||
      (simEdgeLocks[key2] && simEdgeLocks[key2] !== agvId)) {
    return false;
  }
  simEdgeLocks[key1] = agvId;
  simEdgeLocks[key2] = agvId;
  simActiveEdge[agvId] = { a, b };
  console.log('[SIM] lock edge', agvId, a, b, simEdgeLocks);
  return true;
}
//let simActiveEdge = {};
// Г„ВҗГғВЈ sГЎВ»Вӯa tГғВӘn biГЎВәВҝn DOM: topBarContainer thГғВ nh topBarWrapper
const topBarWrapper = document.getElementById('top-bar-wrapper');
const topBar = document.getElementById('top-bar');
const toggleButton = document.getElementById('top-bar-toggle');

//let nodeModal = null;

// ==================== CHГЎВ»ВЁC NГ„вҖҡNG ГЎВәВЁN/HIГЎВ»вҖ N TOPBAR (Г„ВҗГғЖ’ FIX TRIГЎВ»вҖ T Г„ВҗГЎВ»вҖҡ) ====================
// 1. LГЎВәВҘy chiГЎВ»ВҒu cao thГЎВ»Вұc tГЎВәВҝ cГЎВ»В§a Topbar vГғВ  thiГЎВәВҝt lГЎВәВӯp biГЎВәВҝn CSS
function updateTopbarHeight() {
  const height = topBar.offsetHeight; 
  // ThiГЎВәВҝt lГЎВәВӯp biГЎВәВҝn CSS cho CSS tГғВӯnh toГғВЎn vГЎВ»вҖ№ trГғВӯ nГғВәt toggle vГғВ  dГЎВ»вҖ№ch chuyГЎВ»Ж’n container khi ГЎВәВ©n
  document.documentElement.style.setProperty('--top-bar-height-computed', `${height}px`);
}

// 2. XГЎВ»Вӯ lГғВҪ sГЎВ»Вұ kiГЎВ»вҖЎn click
toggleButton.onclick = () => {
  // LuГғВҙn tГғВӯnh lГЎВәВЎi chiГЎВ»ВҒu cao trГҶВ°ГЎВ»вҖәc khi ГЎВәВ©n/hiГЎВ»вҖЎn Г„вҖҳГЎВ»Ж’ Г„вҖҳГЎВәВЈm bГЎВәВЈo Г„вҖҳГЎВ»в„ў chГғВӯnh xГғВЎc
  updateTopbarHeight(); 
  
  // Toggle class trГғВӘn BODY hoГЎВәВ·c DOCUMENT ELEMENT Г„вҖҳГЎВ»Ж’ kГғВӯch hoГЎВәВЎt CSS
  document.documentElement.classList.toggle('topbar-hidden');
};

// ChГЎВәВЎy lГЎВәВ§n Г„вҖҳГЎВәВ§u vГғВ  khi resize
window.addEventListener('load', updateTopbarHeight);
window.addEventListener('resize', updateTopbarHeight);
setTimeout(updateTopbarHeight, 100); 
// =================================================================


// ==================== CHUYГЎВ»вҖҡN Г„ВҗГЎВ»вҖқI TГЎВ»Е’A Г„ВҗГЎВ»Лң PIXEL ====================
function worldToPixel(wx, wy) {
 const px_relative = (wx - originX) / resolution;
 const py_relative = (wy - originY) / resolution;
 const px = imgNatW - py_relative;
 const py = px_relative;
 return { x: px, y: py };
}

function applyOverlayFlip(px, py) {
 return { x: px, y: py };
}


// ==================== XOAY ГЎВәВўNH + BГғв„ў NGГҶВҜГЎВ»ВўC OVERLAY ====================
function applyMapAndOverlayRotation() {
 const totalMapDeg = mapRotation * 180 / Math.PI + userMapRotationDeg;
 const overlayDeg = mapRotation * 180 / Math.PI - userMapRotationDeg; 

 mapCanvas.style.transform = `
  scale(${flipMapX.checked ? -1 : 1}, ${flipMapY.checked ? -1 : 1})
  rotate(${totalMapDeg}deg)
 `;

 const overlayTransform = `rotate(${overlayDeg}deg)`;
 overlayCanvas.style.transform = overlayTransform;
}

// Chuyen theta tu do sang rad neu nhan bang do; giu nguyen neu da la rad
function toRad(theta) {
 return Math.abs(theta) > 2 * Math.PI ? theta * Math.PI / 180 : theta;
}

function drawHighlight() {
 const ctx = overlayCanvas.getContext('2d');
 if (!highlightSegments || !highlightSegments.length) return;
 highlightSegments.forEach(seg => {
  ctx.save();
   ctx.strokeStyle = '#0ea5e9';
   ctx.lineWidth = EDGE_WIDTH_PX + 4;
   ctx.lineCap = 'round';
 ctx.shadowColor = 'rgba(14,165,233,0.7)';
 ctx.shadowBlur = 10;
 ctx.beginPath();
    if (seg.type === 'bezier' && seg.points.length === 4) {
      let p0 = worldToPixel(seg.points[0].x, seg.points[0].y); p0 = applyOverlayFlip(p0.x, p0.y);
      let p1 = worldToPixel(seg.points[1].x, seg.points[1].y); p1 = applyOverlayFlip(p1.x, p1.y);
      let p2 = worldToPixel(seg.points[2].x, seg.points[2].y); p2 = applyOverlayFlip(p2.x, p2.y);
      let p3 = worldToPixel(seg.points[3].x, seg.points[3].y); p3 = applyOverlayFlip(p3.x, p3.y);
      ctx.moveTo(p0.x, p0.y);
      ctx.bezierCurveTo(p1.x, p1.y, p2.x, p2.y, p3.x, p3.y);
      ctx.stroke();
    } else {
      // line/polyline
      let p0 = worldToPixel(seg.points[0].x, seg.points[0].y); p0 = applyOverlayFlip(p0.x, p0.y);
      ctx.moveTo(p0.x, p0.y);
      for (let i = 1; i < seg.points.length; i++) {
        let p = worldToPixel(seg.points[i].x, seg.points[i].y); p = applyOverlayFlip(p.x, p.y);
        ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
    ctx.restore();
  });
}

function buildHighlightFromPair(a, b) {
  const roads = mapData.robot_roads || mapData.roads || [];
  const beziers = mapData.benziers || mapData.robot_benziers || mapData.beziers || [];
  const matchEdge = roads.find(r => String(r.id_source) === a && String(r.id_dest) === b);
  if (matchEdge) {
    return {
      type: 'line',
      points: [
        { x: matchEdge.point_start_x ?? matchEdge.point_start?.[0] ?? 0, y: matchEdge.point_start_y ?? matchEdge.point_start?.[1] ?? 0 },
        { x: matchEdge.point_end_x ?? matchEdge.point_end?.[0] ?? 0, y: matchEdge.point_end_y ?? matchEdge.point_end?.[1] ?? 0 }
      ]
    };
  }
  const matchBz = beziers.find(bz => String(bz.id_source) === a && String(bz.id_dest) === b);
  if (matchBz) {
    return {
      type: 'bezier',
      points: [
        { x: matchBz.point_start_x ?? matchBz.point_start?.[0] ?? 0, y: matchBz.point_start_y ?? matchBz.point_start?.[1] ?? 0 },
        { x: matchBz.curve_point_start_x ?? matchBz.curve_point_start?.[0] ?? 0, y: matchBz.curve_point_start_y ?? matchBz.curve_point_start?.[1] ?? 0 },
        { x: matchBz.curve_point_end_x ?? matchBz.curve_point_end?.[0] ?? 0, y: matchBz.curve_point_end_y ?? matchBz.curve_point_end?.[1] ?? 0 },
        { x: matchBz.point_end_x ?? matchBz.point_end?.[0] ?? 0, y: matchBz.point_end_y ?? matchBz.point_end?.[1] ?? 0 }
      ]
    };
  }
  return null;
}

function setHighlightPathFromNodes(nodeIds, ownerId = null) {
 highlightOwner = ownerId || highlightOwner;
 if (ownerId) stableCounts[ownerId] = 0;
 const destId = Array.isArray(nodeIds) && nodeIds.length ? String(nodeIds[nodeIds.length - 1]) : null;
 highlightDestination = destId;
 if (!mapData || !Array.isArray(nodeIds)) { highlightSegments = []; highlightDestCoord = null; return; }
 const segs = [];
 const pts = mapData.robot_points || mapData.points || [];
 const lookup = {};
 pts.forEach(p => {
   const id = String(p.name_id ?? p.id ?? p.name ?? '');
   lookup[id] = { x: p.x ?? 0, y: p.y ?? 0 };
 });
 const roads = mapData.robot_roads || mapData.roads || [];
 roads.forEach(r => {
   const sid = String(r.id_source ?? r.source ?? '');
   const did = String(r.id_dest ?? r.dest ?? '');
   if (!lookup[sid]) lookup[sid] = { x: r.point_start_x ?? r.point_start?.[0] ?? 0, y: r.point_start_y ?? r.point_start?.[1] ?? 0 };
   if (!lookup[did]) lookup[did] = { x: r.point_end_x ?? r.point_end?.[0] ?? 0, y: r.point_end_y ?? r.point_end?.[1] ?? 0 };
 });
 const beziers = mapData.benziers || mapData.robot_benziers || mapData.beziers || [];
 beziers.forEach(b => {
   const sid = String(b.id_source ?? b.source ?? '');
   const did = String(b.id_dest ?? b.dest ?? '');
   if (!lookup[sid]) lookup[sid] = { x: b.point_start_x ?? b.point_start?.[0] ?? 0, y: b.point_start_y ?? b.point_start?.[1] ?? 0 };
   if (!lookup[did]) lookup[did] = { x: b.point_end_x ?? b.point_end?.[0] ?? 0, y: b.point_end_y ?? b.point_end?.[1] ?? 0 };
 });
 // vбәҪ theo tб»«ng cбә·p node Д‘б»ғ giб»Ҝ Д‘Гәng hГ¬nh hб»Қc (Ж°u tiГӘn bezier/edge)
 for (let i = 0; i < nodeIds.length - 1; i++) {
   const a = String(nodeIds[i]);
   const b = String(nodeIds[i + 1]);
   let seg = buildHighlightFromPair(a, b);
   if (!seg) {
     const pa = lookup[a];
     const pb = lookup[b];
     if (pa && pb) {
       seg = { type: 'line', points: [pa, pb] };
     }
   }
   if (seg) segs.push(seg);
 }
 highlightSegments = segs;
 highlightDestCoord = destId && lookup[destId] ? lookup[destId] : null;
 console.log(`[HIGHLIGHT] Segments: ${highlightSegments.length}, destCoord=${JSON.stringify(highlightDestCoord)}`);
 rebuildAllOverlay();
}

function setHighlightPath(start, dest) {
 highlightOwner = null;
 highlightDestination = null;
 highlightDestCoord = null;
 highlightSegments = (start && dest) ? [{ type: 'line', points: [start, dest] }] : [];
 rebuildAllOverlay();
}

 mapInner.style.transform = `translate(-50%,-50%) scale(${fullScale}) translate(${panX}px,${panY}px)`;

function autoFit() {
 const rect = scene.getBoundingClientRect();
 const sx = rect.width / imgNatW;
 const sy = rect.height / imgNatH;

// ==================== HГғвӮ¬M VГЎВәВј ICON AGV (Xanh Г„ВҗГЎВәВӯm, ViГЎВ»ВҒn TrГЎВәВҜng) ====================
function drawAgvIcon(ctx, x, y, theta, color = '#0A57A4') {
  const size = 16; 
  const radius = 2; 
  const arrowColor = '#ffffff'; 
  
  ctx.save();
  
  ctx.translate(x, y);
  ctx.rotate(theta); 

  // 1. VГЎВәВҪ thГғВўn AGV (HГғВ¬nh chГЎВ»ВҜ nhГЎВәВӯt bo trГғВІn)
  ctx.beginPath();
  ctx.moveTo(-size / 2 + radius, -size / 2);
  ctx.lineTo(size / 2 - radius, -size / 2);
  ctx.arcTo(size / 2, -size / 2, size / 2, -size / 2 + radius, radius);
  ctx.lineTo(size / 2, size / 2 - radius);
  ctx.arcTo(size / 2, size / 2, size / 2 - radius, size / 2, radius);
  ctx.lineTo(-size / 2 + radius, size / 2);
  ctx.arcTo(-size / 2, size / 2, -size / 2, size / 2 - radius, radius);
  ctx.lineTo(-size / 2, -size / 2 + radius);
  ctx.arcTo(-size / 2, -size / 2, -size / 2 + radius, -size / 2, radius);
  ctx.closePath();
  
  ctx.fillStyle = color;
  ctx.strokeStyle = '#FFFFFF'; // ViГЎВ»ВҒn TrГЎВәВҜng
  ctx.lineWidth = 2.0; 
  
  ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0; 
  
  // 2. VГЎВәВҪ MГ…В©i tГғВӘn (Direction)
  ctx.fillStyle = arrowColor;
  ctx.beginPath();
  ctx.moveTo(0, -size / 2 + 2); 
  ctx.lineTo(-3.5, -size / 2 + 8); 
  ctx.lineTo(3.5, -size / 2 + 8);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

function buildNodes(points) {

const EDGE_COLOR = '#d1d5db'; // light smoke gray for base edges
const EDGE_WIDTH_PX = 16;
//let nodeModal = null;
function buildEdges(roads) {
 const ctx = overlayCanvas.getContext('2d');
 ctx.lineCap = 'round';
 
 roads.forEach(r => {
  const sx = r.point_start_x ?? r.point_start?.[0] ?? 0;
  const sy = r.point_start_y ?? r.point_start?.[1] ?? 0;
  const ex = r.point_end_x ?? r.point_end?.[0] ?? 0;
  const ey = r.point_end_y ?? r.point_end?.[1] ?? 0;

 let s = worldToPixel(sx, sy); s = applyOverlayFlip(s.x, s.y);
 let e = worldToPixel(ex, ey); e = applyOverlayFlip(e.x, e.y);

 ctx.strokeStyle = EDGE_COLOR;
 ctx.lineWidth = EDGE_WIDTH_PX;
 ctx.beginPath();
 ctx.moveTo(s.x, s.y);
 ctx.lineTo(e.x, e.y);
 ctx.stroke();
});
}


function buildBeziers(beziers) {
 if (!Array.isArray(beziers) || beziers.length === 0) return;

 const ctx = overlayCanvas.getContext('2d');
 ctx.strokeStyle = EDGE_COLOR;
 ctx.lineWidth = EDGE_WIDTH_PX;
 ctx.lineCap = 'round';

 for (const b of beziers) {
  const pts = ['point_start', 'curve_point_start', 'curve_point_end', 'point_end'].map(key => {
   const x = b[key + '_x'] ?? b[key]?.[0] ?? 0;
   const y = b[key + '_y'] ?? b[key]?.[1] ?? 0;
   let pt = worldToPixel(x, y);
   return applyOverlayFlip(pt.x, pt.y);
  });
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  ctx.bezierCurveTo(pts[1].x, pts[1].y, pts[2].x, pts[2].y, pts[3].x, pts[3].y);
  ctx.stroke();
 }
}

function renderAGVs() {

    const agvThetaRad = toRad(mtheta);
    const headingFix = Math.PI; // quay 180? ?? m?i t?n c?ng chi?u ti?n
    const totalRotationRad = agvThetaRad + headingFix + mapRotation - (userMapRotationDeg * Math.PI / 180);
    const status = getAgvStatus(id);

    const offline = statusLow.includes('mбәҘt') || statusLow.includes('mat');
    const fillColor = offline ? '#9ca3af' : '#0A57A4';
    drawAgvIcon(ctx, x, y, totalRotationRad, fillColor);

}

 if (points.length > 0 && Object.keys(agvs).length === 0) {

  agvs[defaultAgvId] = {
    x: firstNode.x ?? firstNode[0] ?? 0,
    y: firstNode.y ?? firstNode[1] ?? 0,
    theta: firstNode.theta ?? 0
  };
  agvLastUpdate[defaultAgvId] = Date.now();

  // VГЎВәВҪ ngay lГЎВәВӯp tГЎВ»В©c
  drawHighlight();
  renderAGVs();

  console.log(`[DEFAULT] AGV ${defaultAgvId} Г„вҖҳГҶВ°ГЎВ»ВЈc Г„вҖҳГЎВәВ·t ГЎВ»Её node Г„вҖҳГЎВәВ§u tiГғВӘn:`, agvs[defaultAgvId]);
}
}

async function loadMap(mapId) {
 statusEl.textContent = 'Dang tai...';
 mapSelect.disabled = true;
 clearLayers();
 agvs = {}; // Reset AGV khi tai map moi
 lastPoseByAgv = {};
 stableCounts = {};
 agvLastUpdate = {};

 try {
  const res = await fetch(`http://192.168.88.253:8000/api/maps/${mapId}`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  mapData = data;
  mapData.id = mapId; // LГҶВ°u ID map

  const rm = data.robot_maps || {};
  originX = Number(rm.x ?? data.origin_x ?? 0);
  originY = Number(rm.y ?? data.origin_y ?? 0);
  resolution = Number(rm.resolution ?? data.resolution ?? RES_DEFAULT);
  mapRotation = Number(rm.theta ?? data.theta ?? 0);

  const imgSrc = rm.image ? `data:image/png;base64,${rm.image}` : (rm.image_path || data.image_path || '');
  if (!imgSrc) throw new Error('KhГғВҙng cГғВі ГЎВәВЈnh');

  const img = await new Promise((rs, rj) => {
   const i = new Image();
   i.onload = () => rs(i);
   i.onerror = rj;
   i.src = imgSrc;
  });

  drawMapImage(img);
  rebuildAllOverlay();
  userMapRotationDeg = 0;
  manualRotateInput.value = 0;
  autoFit();
  statusEl.textContent = `${rm.name || data.name || mapId} ГўвӮ¬вҖң ${imgNatW}ГғвҖ”${imgNatH}px ГўвӮ¬вҖң res=${resolution.toFixed(4)}`;
 } catch (err) {
  statusEl.textContent = 'LГЎВ»вҖ”i: ' + err.message;
  console.error(err);
 } finally {
  mapSelect.disabled = false;
 }
}

scene.addEventListener('wheel', e => {
 e.preventDefault();
 const rect = scene.getBoundingClientRect();
 const mx = e.clientX - rect.left;
 const my = e.clientY - rect.top;
 const oldZoom = userZoom;
 userZoom = Math.max(0.2, Math.min(10, userZoom * (e.deltaY < 0 ? 1.1 : 0.9)));

 const ratio = userZoom / oldZoom;
 panX = panX * ratio + mx / (scaleView * oldZoom) * (1 - ratio);
 panY = panY * ratio + my / (scaleView * oldZoom) * (1 - ratio);
 applyTransform();
});

scene.addEventListener('mousedown', e => {
 if (e.button !== 0) return;
 dragging = true;
 dragStart = { x: e.clientX, y: e.clientY };
 panStart = { x: panX, y: panY };
 scene.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
 if (!dragging) return;
 const dx = (e.clientX - dragStart.x) / (scaleView * userZoom);
 const dy = (e.clientY - dragStart.y) / (scaleView * userZoom);
 panX = panStart.x + dx;
 panY = panStart.y + dy;
 applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; scene.style.cursor = 'default'; });

function getAgvStatus(id) {
  const now = Date.now();
  const last = agvLastUpdate[id] || 0;
  if (!last || now - last > 1500) return 'MбәҘt kбәҝt nб»‘i'; // offline nбәҝu quГЎ 1.5s khГҙng cбәӯp nhбәӯt

  return moving ? 'Дҗang hoбәЎt Д‘б»ҷng' : 'RбәЈnh';
}

// ==================== MГ” PHб»ҺNG ====================
function buildPointLookup() {
  const pts = mapData?.robot_points || mapData?.points || mapData?.poses || [];
  const lookup = {};
  pts.forEach(p => {
    const id = String(p.name_id ?? p.id ?? p.name ?? '');
    lookup[id] = { x: p.x ?? p[0] ?? 0, y: p.y ?? p[1] ?? 0 };
  });
  return lookup;
}

function buildAdjacency(agvId) {
  const adj = {};
  const add = (a, b) => {
    if (!adj[a]) adj[a] = new Set();
    adj[a].add(b);
  };
  const roads = mapData?.robot_roads || mapData?.roads || [];
  const beziers = mapData?.benziers || mapData?.robot_benziers || mapData?.beziers || [];
  [...roads, ...beziers].forEach(r => {
    const a = String(r.id_source ?? r.source ?? '');
    const b = String(r.id_dest ?? r.dest ?? '');
    if (!a || !b) return;
    const key1 = `${a}->${b}`;
    const key2 = `${b}->${a}`;
    const blocked1 = simEdgeLocks[key1] && simEdgeLocks[key1] !== agvId;
    const blocked2 = simEdgeLocks[key2] && simEdgeLocks[key2] !== agvId;
    const activeBlocked1 = Object.entries(simActiveEdge).some(([id, edge]) => id !== agvId && edge.a === a && edge.b === b);
    const activeBlocked2 = Object.entries(simActiveEdge).some(([id, edge]) => id !== agvId && edge.a === b && edge.b === a);
    if (!blocked1 && !activeBlocked1) add(a, b);
    if (!blocked2 && !activeBlocked2) add(b, a);
  });
  return adj;
}

function shortestPathClient(startId, destId, agvId) {
  if (!startId || !destId) return null;
  const adj = buildAdjacency(agvId);
  const q = [startId];
  const visited = new Set([startId]);
  const parent = {};
  while (q.length) {
    const cur = q.shift();
    if (cur === destId) break;
    (adj[cur] || []).forEach(n => {
      if (!visited.has(n)) {
        visited.add(n);
        parent[n] = cur;
        q.push(n);
      }
    });
  }
  if (!visited.has(destId)) return null;
  const path = [];
  let cur = destId;
  while (cur !== undefined) {
    path.unshift(cur);
    cur = parent[cur];
  }
  return path;
}

function nearestNodeId(x, y) {
  const pts = buildPointLookup();
  let best = null;
  let bestDist = Infinity;
  Object.entries(pts).forEach(([id, p]) => {
    const dx = (p.x ?? 0) - x;
    const dy = (p.y ?? 0) - y;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; best = id; }
  });
  return best;
}

function setSimStatus(on) {
  simulationMode = on;
  toggleSimBtn.textContent = on ? 'TбәҜt mГҙ phб»Ҹng' : 'Bбәӯt mГҙ phб»Ҹng';
  statusEl.textContent = on ? 'MГҙ phб»Ҹng' : 'Sбәөn sГ ng';
}

function stopSimAnimations() {
  Object.values(simAnimations).forEach(a => cancelAnimationFrame(a));
  simAnimations = {};
}

function enableSimulation() {
  if (!mapData) { alert('HГЈy chб»Қn map trЖ°б»ӣc.'); return; }
  stopSimAnimations();
  simEdgeLocks = {};
  simActiveEdge = {};
  agvs = {};
  const pts = buildPointLookup();
  const ids = Object.keys(pts);
  if (!ids.length) { alert('Map chЖ°a cГі Д‘iб»ғm.'); return; }
  const first = ids[0];
  const second = ids[1] || ids[0];
  agvs['SIM-1'] = { x: pts[first].x, y: pts[first].y, theta: 0, lastNodeId: first, last_update: new Date().toISOString() };
  agvs['SIM-2'] = { x: pts[second].x, y: pts[second].y, theta: 0, lastNodeId: second, last_update: new Date().toISOString() };
  agvLastUpdate['SIM-1'] = Date.now();
  agvLastUpdate['SIM-2'] = Date.now();
  lastPoseByAgv['SIM-1'] = { x: pts[first].x, y: pts[first].y, theta: 0 };
  lastPoseByAgv['SIM-2'] = { x: pts[second].x, y: pts[second].y, theta: 0 };
  setSimStatus(true);
  refreshAgvSelect();
  rebuildAllOverlay();
}

function disableSimulation() {
  simEdgeLocks = {};
  simActiveEdge = {};
  stopSimAnimations();
  simulationMode = false;
  setSimStatus(false);
}

toggleSimBtn.onclick = () => {
  simulationMode ? disableSimulation() : enableSimulation();
};

function animateSimMove(agvId, points, pathNodes) {
  if (!points || points.length < 2) return;
  let idx = 0; let lastTs = null;
  if (pathNodes && pathNodes[0] && pathNodes[1]) {
    if (!setEdgeLock(agvId, pathNodes[0], pathNodes[1])) {
      console.log('[SIM] cannot lock first edge', agvId, pathNodes[0], pathNodes[1]);
      return;
    }
  }
  const step = (ts) => {
    if (lastTs === null) lastTs = ts;
    const dt = Math.min(0.05, (ts - lastTs) / 1000 || 0.016);
    lastTs = ts;
    const p0 = points[idx];
    const p1 = points[idx + 1];
    const dx = p1.x - p0.x;
    const dy = p1.y - p0.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // l?u edge hi?n t?i ?? block runtime
    if (pathNodes && pathNodes[idx] && pathNodes[idx+1]) {
      simActiveEdge[agvId] = { a: pathNodes[idx], b: pathNodes[idx+1] };
    }
    if (dist < 1e-6) {
      idx++;
      if (idx >= points.length - 1) { cleanup(); return; }
      simAnimations[agvId] = requestAnimationFrame(step);
      return;
    }
    const speed = Math.max(0.6, dist * 0.3);
    const stepDist = speed * dt;
    const t = Math.min(1, stepDist / dist);
    const newX = p0.x + dx * t;
    const newY = p0.y + dy * t;
    const theta = Math.atan2(dy, dx);
    points[idx] = { ...p0, x: newX, y: newY };
    agvs[agvId] = { x: newX, y: newY, theta, lastNodeId: p0.nodeId || agvs[agvId]?.lastNodeId, last_update: new Date().toISOString() };
    agvLastUpdate[agvId] = Date.now();
    rebuildAllOverlay();
    if (t >= 0.999) {
      idx++;
      if (pathNodes && pathNodes[idx] && pathNodes[idx+1]) {
        if (!setEdgeLock(agvId, pathNodes[idx], pathNodes[idx+1])) {
          console.log('[SIM] next segment locked, stop', agvId);
          cleanup();
          return;
        }
      }
    }
    if (idx >= points.length - 1) { cleanup(); return; }
    simAnimations[agvId] = requestAnimationFrame(step);
  };
  const cleanup = () => {
    if (simAnimations[agvId]) cancelAnimationFrame(simAnimations[agvId]);
    delete simAnimations[agvId];
    delete simActiveEdge[agvId];
    clearAgvLocks(agvId);
  };
  simAnimations[agvId] = requestAnimationFrame(step);
}

function sampleBezierPoints(p0, p1, p2, p3, steps = 30) {
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const mt = 1 - t;
    const x = mt * mt * mt * p0.x + 3 * mt * mt * t * p1.x + 3 * mt * t * t * p2.x + t * t * t * p3.x;
    const y = mt * mt * mt * p0.y + 3 * mt * mt * t * p1.y + 3 * mt * t * t * p2.y + t * t * t * p3.y;
    pts.push({ x, y });
  }
  return pts;
}

function getEdgePoints(a, b, lookup) {
  const roads = mapData?.robot_roads || mapData?.roads || [];
  const beziers = mapData?.benziers || mapData?.robot_benziers || mapData?.beziers || [];
  const road = roads.find(r => String(r.id_source ?? r.source ?? '') === a && String(r.id_dest ?? r.dest ?? '') === b);
  if (road) {
    return [{ ...lookup[a], nodeId: a }, { ...lookup[b], nodeId: b }];
  }
  const bz = beziers.find(r => String(r.id_source ?? r.source ?? '') === a && String(r.id_dest ?? r.dest ?? '') === b);
  if (bz) {
    const p0 = { x: bz.point_start_x ?? bz.point_start?.[0] ?? lookup[a].x, y: bz.point_start_y ?? bz.point_start?.[1] ?? lookup[a].y };
    const p1 = { x: bz.curve_point_start_x ?? bz.curve_point_start?.[0] ?? p0.x, y: bz.curve_point_start_y ?? bz.curve_point_start?.[1] ?? p0.y };
    const p2 = { x: bz.curve_point_end_x ?? bz.curve_point_end?.[0] ?? lookup[b].x, y: bz.curve_point_end_y ?? bz.curve_point_end?.[1] ?? lookup[b].y };
    const p3 = { x: bz.point_end_x ?? bz.point_end?.[0] ?? lookup[b].x, y: bz.point_end_y ?? bz.point_end?.[1] ?? lookup[b].y };
    const pts = sampleBezierPoints(p0, p1, p2, p3, 30);
    pts[0].nodeId = a; pts[pts.length - 1].nodeId = b;
    return pts;
  }
  return [{ ...lookup[a], nodeId: a }, { ...lookup[b], nodeId: b }];
}

function pathToPoints(pathNodes, lookup) {
  const pts = [];
  for (let i = 0; i < pathNodes.length - 1; i++) {
    const a = pathNodes[i];
    const b = pathNodes[i + 1];
    const seg = getEdgePoints(a, b, lookup);
    if (pts.length) seg.shift();
    pts.push(...seg);
  }
  return pts;
}

function findBlockedEdge(pathNodes, agvId) {
  for (let i = 0; i < pathNodes.length - 1; i++) {
    const a = pathNodes[i];
    const b = pathNodes[i + 1];
    const key1 = `${a}->${b}`;
    const key2 = `${b}->${a}`;
    const otherActive = Object.entries(simActiveEdge).some(([id, edge]) => id !== agvId && edge.a === a && edge.b === b);
    if ((simEdgeLocks[key1] && simEdgeLocks[key1] !== agvId) ||
        (simEdgeLocks[key2] && simEdgeLocks[key2] !== agvId) ||
        otherActive) {
      return i;
    }
  }
  return -1;
}

function simulateMove(node, agvId) {
  if (!mapData) { alert('Chua c? map'); return; }
  const pts = buildPointLookup();
  const destId = String(node.id || node.name || node.nodeId || '');
  const destCoord = pts[destId];
  if (!destCoord) { alert('Kh?ng t?m th?y ?i?m ??ch tr?n map.'); return; }
  if (!agvId) {
    const ids = Object.keys(agvs);
    agvId = ids[0];
  }
  if (!agvId || !agvs[agvId]) { alert('Chua c? AGV m? ph?ng.'); return; }
  const agvPose = agvs[agvId];
  const startNode = agvPose.lastNodeId || nearestNodeId(agvPose.x ?? 0, agvPose.y ?? 0);

  const safePath = shortestPathClient(String(startNode), destId, agvId);
  console.log('[SIM] plan', { agvId, startNode, destId, safePath, locks: simEdgeLocks, active: simActiveEdge });
  if (!safePath || safePath.length < 2) { alert('Kh?ng t?m th?y ???ng ?i.'); return; }
  let pathNodes = safePath;
  const blockedIdx = findBlockedEdge(pathNodes, agvId);
  if (blockedIdx >= 0) {
    const waitIdx = Math.max(0, blockedIdx - 2);
    pathNodes = pathNodes.slice(0, waitIdx + 1);
    if (pathNodes.length < 2) { alert('???ng ?ang b? chi?m, h?y th? l?i sau.'); return; }
  }
  if (pathNodes.length > 1) {
    if (!setEdgeLock(agvId, pathNodes[0], pathNodes[1])) {
      alert('ДҗЖ°б»қng Д‘ang bб»Ӣ AGV khГЎc khГіa, thб»ӯ lбәЎi sau hoбә·c chб»Қn Д‘Ж°б»қng khГЎc.');
      return;
    }
  }
  setHighlightPathFromNodes(pathNodes, agvId);
  const pathPoints = pathToPoints(pathNodes, pts);
  if (!pathPoints || pathPoints.length < 2) { alert('Kh?ng d?ng ???c ???ng ?i.'); return; }
  animateSimMove(agvId, pathPoints, pathNodes);
}
async function sendMoveOrder(node) {
  const agvIds = Object.keys(agvs);
  if (!agvIds.length) {
    alert('ChЖ°a cГі AGV online.');
    return;
  }
  const chosen = agvSelect?.value;
  const agvId = chosen && agvIds.includes(chosen) ? chosen : agvIds[0];
  if (simulationMode) {
    simulateMove(node, agvId);
    return;
  }
  try {
    const res = await fetch('/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agv_id: agvId, destination: node.id || node.name })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    statusEl.textContent = `ДҗГЈ gб»ӯi lб»Үnh tб»ӣi ${node.name || node.id} (AGV ${agvId})`;
    if (Array.isArray(data.path)) {
      setHighlightPathFromNodes(data.path, agvId);
    } else {
      const pose = agvs[agvId];
      if (pose) {
        setHighlightPath({ x: pose.x || 0, y: pose.y || 0 }, { x: node.x, y: node.y });
      }
    }
  } catch (err) {
    console.error(err);
    alert('KhГҙng gб»ӯi Д‘Ж°б»Јc lб»Үnh: ' + err.message);
  }
}

// // ====================// ==================== BГЎВ»вҖқ SUNG: WEBSOCKET & CГЎВәВ¬P NHГЎВәВ¬T AGV ====================

// HГғВ m cГЎВәВӯp nhГЎВәВӯt vГЎВ»вҖ№ trГғВӯ AGV (Г„ВҗГҶВ°ГЎВ»ВЈc gГЎВ»ВҚi tГЎВ»В« WebSocket)
function updateAGVPoses(newPoses) {
    if (newPoses) {
        Object.entries(newPoses).forEach(([id, pose]) => {
            const prev = lastPoseByAgv[id] || agvs[id];
            const eps = 1e-3;
            if (prev && Math.abs((pose.x ?? 0) - (prev.x ?? 0)) < eps && Math.abs((pose.y ?? 0) - (prev.y ?? 0)) < eps) {
                stableCounts[id] = (stableCounts[id] || 0) + 1;
            } else {
                stableCounts[id] = 0;
            }
            lastPoseByAgv[id] = { x: pose.x ?? 0, y: pose.y ?? 0, theta: pose.theta ?? 0 };
            agvLastUpdate[id] = Date.now();
        });
        agvs = newPoses;
        if (highlightOwner && highlightDestCoord) {
            const ownerPose = agvs[highlightOwner];
            if (ownerPose) {
                const poseX = ownerPose.x ?? 0;
                const poseY = ownerPose.y ?? 0;
                // Chб»ү cбә§n trГ№ng phбә§n nguyГӘn cб»§a x vГ  y
                if (Math.floor(poseX) === Math.floor(highlightDestCoord.x) &&
                    Math.floor(poseY) === Math.floor(highlightDestCoord.y)) {
                    highlightSegments = [];
                    highlightOwner = null;
                    highlightDestination = null;
                    highlightDestCoord = null;
                    rebuildAllOverlay();
                    return;
                }
            }
        }
    }
    
    if (!mapData || !overlayCanvas) return;

    // Ch? x?a v? v? l?i AGV + highlight
    const ctx = overlayCanvas.getContext('2d');
    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    buildEdges(mapData.robot_roads || mapData.roads || []);
    const beziers = mapData.benziers || mapData.robot_benziers || mapData.beziers || [];
    if (beziers.length > 0) buildBeziers(beziers);
    buildNodes(mapData.robot_points || mapData.points || mapData.poses || []);
    drawHighlight();

    renderAGVs();
    refreshAgvSelect();
}

function setupWebSocket() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket('ws://192.168.88.253:8000/ws');

  ws.onopen = () => console.log("[WS] Connected.");

  ws.onclose = () => { 
    console.log("[WS] Disconnected. Reconnecting in 5s...");
    setTimeout(setupWebSocket, 5000);
  };

  ws.onerror = (err) => console.error("[WS] Error:", err);

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);

      if (data.type === 'agv_pose_update') {
        updateAGVPoses(data.poses);
      } else if (data.type === 'external_command' && data.action === 'MOVE' && Array.isArray(data.path)) {
        setHighlightPathFromNodes(data.path, data.agv_id || null);
      }
    } catch (e) {
      console.error("[WS] Lб»—i xб»ӯ lГҪ dб»Ҝ liб»Үu:", e);
    }
  };
}
